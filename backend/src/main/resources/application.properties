spring.application.name=backend

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Datasource (overridden by Docker Compose env vars)
spring.datasource.url=jdbc:postgresql://localhost:5432/diploma
spring.datasource.username=myuser
spring.datasource.password=secret

# JWT
app.jwt.secret=${JWT_SECRET:my-jwt-secret-key-that-is-at-least-256-bits-long-for-hs256}
app.jwt.expiration-ms=86400000

# Admin security key
app.admin.security-key=${ADMIN_SECURITY_KEY:super-secret-key-change-me}

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
